<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galeria do Cliente — CriaVibe</title>
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body{background:#0a0a0f;color:#fff;margin:0;font-family:'Inter',sans-serif}
    .cli-nav{position:fixed;top:0;left:0;right:0;z-index:200;height:56px;background:rgba(10,10,15,.85);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.1);display:flex;align-items:center;padding:0 24px;gap:12px}
    .cli-logo{font-size:1.1rem;font-weight:800;color:#fff}
    .cli-spacer{flex:1}
    .cli-gal-nome{font-size:.9rem;font-weight:600;color:rgba(255,255,255,.8);max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .photos-masonry{column-count:3;column-gap:6px;padding:6px;margin-top:56px}
    .masonry-item{break-inside:avoid;margin-bottom:6px;cursor:pointer;border-radius:4px;overflow:hidden;position:relative}
    .masonry-item img{width:100%;display:block;transition:opacity .3s}
    .masonry-item:hover img{opacity:.85}
    .masonry-sel-badge{position:absolute;top:6px;right:6px;width:24px;height:24px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;font-size:.65rem;color:#fff;opacity:0;transition:opacity .2s}
    .masonry-item.sel .masonry-sel-badge{opacity:1}
    .cli-controls{position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,15,.9);backdrop-filter:blur(12px);border-top:1px solid rgba(255,255,255,.1);padding:12px 24px;display:flex;align-items:center;gap:12px;z-index:200}
    .sel-count{font-size:.85rem;color:rgba(255,255,255,.7)}
    .sel-count strong{color:#fff;font-size:1rem}
    /* Lightbox */
    .lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.96);z-index:1000;align-items:center;justify-content:center}
    .lightbox.open{display:flex}
    .lightbox img{max-width:92vw;max-height:92vh;border-radius:6px;object-fit:contain}
    .lb-close{position:absolute;top:16px;right:20px;color:#fff;font-size:1.8rem;cursor:pointer;background:none;border:none}
    .lb-nav{position:absolute;top:50%;transform:translateY(-50%);color:#fff;font-size:2rem;cursor:pointer;background:rgba(255,255,255,.08);border:none;padding:8px 14px;border-radius:8px;transition:.2s}
    .lb-nav:hover{background:rgba(255,255,255,.2)}
    .lb-nav.prev{left:12px}.lb-nav.next{right:12px}
    @media(max-width:600px){.photos-masonry{column-count:2}}
  </style>
</head>
<body>

<nav class="cli-nav">
  <div class="cli-logo">✦ CriaVibe</div>
  <div class="cli-spacer"></div>
  <span class="cli-gal-nome" id="gal-nome">Galeria</span>
</nav>

<div id="loading" style="display:flex;align-items:center;justify-content:center;height:80vh;gap:12px;color:rgba(255,255,255,.5)">
  <i class="fa-solid fa-spinner fa-spin"></i> Carregando galeria...
</div>

<div class="photos-masonry" id="photos-grid" style="display:none"></div>

<div class="cli-controls" id="cli-controls" style="display:none">
  <div class="sel-count">
    <strong id="sel-count">0</strong> foto(s) selecionada(s)
  </div>
  <div style="flex:1"></div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="if(event.target===this)closeLb()">
  <button class="lb-close" onclick="closeLb()">&times;</button>
  <button class="lb-nav prev" onclick="navLb(-1)"><i class="fa-solid fa-chevron-left"></i></button>
  <img id="lb-img" src="" alt="">
  <button class="lb-nav next" onclick="navLb(1)"><i class="fa-solid fa-chevron-right"></i></button>
</div>

<script src="/assets/js/api.js"></script>
<script>
const token = new URLSearchParams(location.search).get('token');
let fotos = [];
let lbIdx = 0;

(async () => {
  try {
    const gd = await API.get(`/galerias/get.php?token=${token}`);
    const galeria = gd.galeria;
    document.title = galeria.nome + ' — CriaVibe';
    document.getElementById('gal-nome').textContent = galeria.nome;

    const fd = await API.get(`/fotos/list.php?galeria_id=${galeria.id}`);
    fotos = fd.fotos || [];
    renderFotos();
  } catch(e) {
    document.getElementById('loading').innerHTML = `<p style="color:rgba(255,255,255,.5)">Galeria não encontrada ou acesso negado.</p>`;
  }
})();

function renderFotos() {
  const grid = document.getElementById('photos-grid');
  document.getElementById('loading').style.display='none';
  grid.style.display='';
  document.getElementById('cli-controls').style.display='flex';
  grid.innerHTML = fotos.map((f,i) => `
    <div class="masonry-item ${f.selecionada?'sel':''}" id="mi-${f.id}" onclick="abrirLb(${i})">
      <img src="/${f.caminho_arquivo}" alt="${f.nome_arquivo}" loading="lazy">
      <div class="masonry-sel-badge"><i class="fa-solid fa-check"></i></div>
    </div>
  `).join('');
  atualizarSel();
}

function atualizarSel() {
  const count = fotos.filter(f=>f.selecionada).length;
  document.getElementById('sel-count').textContent = count;
}

function abrirLb(i) { lbIdx=i; document.getElementById('lb-img').src='/'+fotos[i].caminho_arquivo; document.getElementById('lightbox').classList.add('open'); }
function closeLb()  { document.getElementById('lightbox').classList.remove('open'); }
function navLb(d)   { lbIdx=(lbIdx+d+fotos.length)%fotos.length; document.getElementById('lb-img').src='/'+fotos[lbIdx].caminho_arquivo; }
document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key==='ArrowRight') navLb(1);
  if (e.key==='ArrowLeft')  navLb(-1);
  if (e.key==='Escape')     closeLb();
});
</script>
</body>
</html>
