<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CriaVibe — Sua Galeria</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0a0a14;--surface:rgba(255,255,255,.05);--border:rgba(255,255,255,.1);
      --primary:#6366f1;--primary-dk:#4f46e5;--text:#f8fafc;--muted:rgba(255,255,255,.55);
    }
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    a{text-decoration:none;color:inherit}
    /* ── PASSWORD SCREEN ── */
    #lock-screen{
      position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
      background:linear-gradient(135deg,#070711 0%,#0f0f2a 100%);z-index:200;
    }
    .lock-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);
      border-radius:20px;padding:48px;width:100%;max-width:420px;text-align:center;
      backdrop-filter:blur(20px);box-shadow:0 32px 80px rgba(0,0,0,.6)}
    .lock-logo{font-size:1.5rem;font-weight:800;
      background:linear-gradient(135deg,#fff,var(--primary));-webkit-background-clip:text;
      -webkit-text-fill-color:transparent;margin-bottom:8px}
    .lock-sub{font-size:.9rem;color:var(--muted);margin-bottom:32px}
    .lock-card h2{font-size:1.25rem;font-weight:700;margin-bottom:6px}
    .lock-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(99,102,241,.15);
      border:1px solid rgba(99,102,241,.3);border-radius:20px;padding:4px 14px;font-size:.8rem;
      color:var(--primary);margin-bottom:28px}
    .form-group{margin-bottom:16px;text-align:left}
    .form-group label{display:block;font-size:.8rem;font-weight:600;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
    .form-control{width:100%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);
      border-radius:10px;padding:12px 16px;font-size:.95rem;color:var(--text);font-family:inherit;
      transition:.2s;outline:none}
    .form-control:focus{border-color:var(--primary);background:rgba(99,102,241,.08)}
    .form-error{color:#f87171;font-size:.82rem;margin-top:4px;display:none}
    .form-error.show{display:block}
    .btn{width:100%;padding:13px;border-radius:10px;font-size:.95rem;font-weight:700;
      border:none;cursor:pointer;font-family:inherit;transition:.2s;display:flex;
      align-items:center;justify-content:center;gap:8px}
    .btn-primary{background:var(--primary);color:#fff;box-shadow:0 4px 16px rgba(99,102,241,.4)}
    .btn-primary:hover{background:var(--primary-dk);transform:translateY(-1px)}
    .btn-disabled{opacity:.5;cursor:not-allowed}
    /* ── TOP NAV ── */
    #topnav{position:sticky;top:0;z-index:100;height:60px;display:flex;align-items:center;
      padding:0 5vw;gap:16px;background:rgba(10,10,20,.8);backdrop-filter:blur(16px);
      border-bottom:1px solid var(--border)}
    #topnav .logo{font-size:1.1rem;font-weight:800;
      background:linear-gradient(135deg,#fff,var(--primary));-webkit-background-clip:text;
      -webkit-text-fill-color:transparent}
    #galeria-nome{font-size:1rem;font-weight:600;flex:1;text-align:center}
    #dl-counter{font-size:.8rem;color:var(--muted);padding:5px 14px;border-radius:20px;
      background:rgba(255,255,255,.06);border:1px solid var(--border);white-space:nowrap}
    /* ── TOOLBAR ── */
    #toolbar{position:sticky;top:60px;z-index:90;background:rgba(10,10,20,.9);
      backdrop-filter:blur(12px);border-bottom:1px solid var(--border);
      padding:10px 5vw;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .toolbar-info{font-size:.82rem;color:var(--muted);margin-right:auto}
    .tbtn{padding:8px 16px;border-radius:8px;font-size:.83rem;font-weight:600;
      border:none;cursor:pointer;font-family:inherit;transition:.2s;
      display:flex;align-items:center;gap:6px}
    .tbtn-outline{background:transparent;color:var(--text);border:1px solid var(--border)}
    .tbtn-outline:hover{border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.06)}
    .tbtn-primary{background:var(--primary);color:#fff}
    .tbtn-primary:hover{background:var(--primary-dk)}
    .tbtn-green{background:rgba(34,197,94,.15);color:#4ade80;border:1px solid rgba(34,197,94,.3)}
    .tbtn-green:hover{background:rgba(34,197,94,.25)}
    .tbtn:disabled{opacity:.35;cursor:not-allowed;transform:none!important}
    /* ── GALLERY GRID ── */
    #gallery{padding:24px 5vw;columns:2 180px;gap:12px}
    @media(min-width:600px){#gallery{columns:3 200px}}
    @media(min-width:900px){#gallery{columns:4 220px}}
    @media(min-width:1200px){#gallery{columns:5 240px}}
    .foto-item{break-inside:avoid;margin-bottom:12px;position:relative;border-radius:10px;
      overflow:hidden;cursor:pointer;border:2px solid transparent;transition:.2s}
    .foto-item img{width:100%;display:block;transition:transform .4s}
    .foto-item:hover img{transform:scale(1.04)}
    .foto-item.selected{border-color:var(--primary);box-shadow:0 0 0 3px rgba(99,102,241,.3)}
    .foto-item .sel-check{position:absolute;top:8px;right:8px;width:26px;height:26px;
      border-radius:50%;background:var(--primary);display:flex;align-items:center;
      justify-content:center;font-size:.75rem;color:#fff;opacity:0;transition:.2s;
      box-shadow:0 2px 8px rgba(0,0,0,.4);pointer-events:none}
    .foto-item.selected .sel-check{opacity:1}
    .foto-item .dl-btn{position:absolute;bottom:8px;right:8px;padding:5px 10px;
      background:rgba(0,0,0,.7);color:#fff;border:none;border-radius:6px;cursor:pointer;
      font-size:.73rem;font-weight:600;font-family:inherit;opacity:0;transition:.2s;
      display:flex;align-items:center;gap:4px;backdrop-filter:blur(4px)}
    .foto-item:hover .dl-btn{opacity:1}
    .foto-item .dl-btn:hover{background:var(--primary)}
    /* ── MUSIC ── */
    #music-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,20,.95);
      backdrop-filter:blur(16px);border-top:1px solid var(--border);
      padding:10px 5vw;display:flex;align-items:center;gap:12px;z-index:50}
    #music-bar audio{flex:1;height:32px;min-width:0}
    #music-bar .music-title{font-size:.8rem;color:var(--muted);max-width:180px;
      overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    /* ── LIGHTBOX ── */
    #lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);
      z-index:300;align-items:center;justify-content:center}
    #lightbox.open{display:flex}
    #lb-img{max-width:92vw;max-height:90vh;object-fit:contain;border-radius:6px}
    .lb-btn{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.1);
      border:none;color:#fff;font-size:1.5rem;padding:14px 18px;cursor:pointer;
      border-radius:10px;transition:.2s}
    .lb-btn:hover{background:rgba(255,255,255,.2)}
    #lb-prev{left:16px}
    #lb-next{right:16px}
    #lb-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.1);
      border:none;color:#fff;font-size:1.3rem;padding:8px 12px;cursor:pointer;border-radius:8px}
    #lb-dl{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:30px;box-shadow:0 8px 30px rgba(0,0,0,0.5);font-size:1rem;z-index:310}
    .loading{text-align:center;padding:80px;color:var(--muted)}
    .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
      background:#1e1e3a;border:1px solid var(--primary);border-radius:10px;
      padding:12px 24px;font-size:.85rem;color:#fff;z-index:9999;
      opacity:0;transition:.3s;white-space:nowrap;pointer-events:none}
    .toast.show{opacity:1}
  </style>
</head>
<body>

<!-- LOCK SCREEN -->
<div id="lock-screen">
  <div class="lock-card">
    <div class="lock-logo">✦ CriaVibe</div>
    <p class="lock-sub">Plataforma de galerias para fotógrafos</p>
    <div class="lock-badge"><i class="fa-solid fa-lock"></i> Galeria Exclusiva</div>
    <h2 id="galeria-title-lock">Acessar Galeria</h2>
    <p style="font-size:.85rem;color:var(--muted);margin:6px 0 24px">Digite sua senha de acesso</p>
    <div class="form-group">
      <label>Senha de Acesso</label>
      <input id="senha-input" class="form-control" type="text" placeholder="Ex: A17086" autocomplete="off">
      <div class="form-error" id="senha-erro">Senha incorreta. Tente novamente.</div>
    </div>
    <button class="btn btn-primary" id="btn-entrar" onclick="autenticar()">
      <i class="fa-solid fa-arrow-right-to-bracket"></i> Entrar na Galeria
    </button>
  </div>
</div>

<!-- TOP NAV -->
<nav id="topnav" style="display:none">
  <div class="logo">✦ CriaVibe</div>
  <div id="galeria-nome"></div>
  <div id="dl-counter" style="display:none"></div>
</nav>

<!-- TOOLBAR -->
<div id="toolbar" style="display:none">
  <div class="toolbar-info" id="toolbar-info" style="font-size:0.75rem; line-height:1.4;">
    * 1 Clique na foto para selecionar<br>
    * 2 Cliques para ampliar a foto na tela<br>
    * 3 Cliques para selecionar todas possíveis
  </div>
  <button class="tbtn tbtn-outline" id="btn-select-all" onclick="selecionarTodas()" style="display:none">
    <i class="fa-solid fa-check-double"></i> Todas
  </button>
  <button class="tbtn tbtn-outline" onclick="limparSelecao()" id="btn-clear" style="display:none">
    <i class="fa-solid fa-times"></i> Limpar
  </button>
  <button class="tbtn tbtn-green" id="btn-zip-sel" onclick="baixarZipSelecionadas()" style="display:none">
    <i class="fa-solid fa-file-zipper"></i> Baixar Selecionadas (<span id="sel-count">0</span>)
  </button>
  <button class="tbtn tbtn-primary" id="btn-zip-all" onclick="baixarZipTodas()" style="display:none">
    <i class="fa-solid fa-download"></i> Baixar Todas
  </button>
</div>

<!-- GALLERY -->
<div id="gallery"><div class="loading"><i class="fa-solid fa-spinner fa-spin"></i> Carregando fotos...</div></div>

<!-- LIGHTBOX -->
<div id="lightbox">
  <button id="lb-close" onclick="fecharLightbox()">✕</button>
  <button class="lb-btn" id="lb-prev" onclick="navLightbox(-1)">‹</button>
  <img id="lb-img" src="" alt="">
  <button class="lb-btn" id="lb-next" onclick="navLightbox(1)">›</button>
  <button class="tbtn tbtn-primary lb-btn" id="lb-dl" onclick="baixarFotoAtual()">
    <i class="fa-solid fa-download"></i> Baixar
  </button>
</div>

<!-- MUSIC BAR -->
<div id="music-bar" style="display:none">
  <i class="fa-solid fa-music" style="color:var(--primary)"></i>
  <span class="music-title" id="music-title"></span>
  <audio id="audio-player" controls autoplay></audio>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const params = new URLSearchParams(location.search);
const TOKEN  = params.get('token') || '';
let GALERIA  = null;
let FOTOS    = [];
let selecionadas = new Set();
let lbIndex  = 0;
let dlCount  = 0;
let dlMax    = 0;

// ── AUTH ──────────────────────────────────────────────────────
async function autenticar() {
  const senha = document.getElementById('senha-input').value.trim();
  const erro  = document.getElementById('senha-erro');
  const btn   = document.getElementById('btn-entrar');
  if (!senha) { erro.style.display='block'; erro.textContent='Digite sua senha.'; return; }
  btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Verificando...';
  try {
    const r = await fetch('/api/galerias/verify_access.php', {
      method:'POST', credentials:'include',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({token: TOKEN, senha})
    });
    const d = await r.json();
    if (d.status === 'ok') {
      GALERIA = d.galeria;
      dlCount = d.dl_count || 0;
      dlMax   = GALERIA.max_selecao ? parseInt(GALERIA.max_selecao) : 0;
      document.getElementById('lock-screen').style.display = 'none';
      iniciarGaleria();
    } else {
      erro.textContent = d.mensagem || 'Senha incorreta.';
      erro.style.display = 'block';
      btn.disabled = false;
      btn.innerHTML = '<i class="fa-solid fa-arrow-right-to-bracket"></i> Entrar na Galeria';
    }
  } catch {
    erro.textContent = 'Erro de conexão. Tente novamente.';
    erro.style.display = 'block';
    btn.disabled = false;
    btn.innerHTML = '<i class="fa-solid fa-arrow-right-to-bracket"></i> Entrar na Galeria';
  }
}

// Enter key on password
document.getElementById('senha-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') autenticar();
});

// ── INIT ──────────────────────────────────────────────────────
async function iniciarGaleria() {
  // Nav
  document.getElementById('topnav').style.display = 'flex';
  document.getElementById('toolbar').style.display = 'flex';
  document.getElementById('galeria-nome').textContent = GALERIA.nome;
  document.title = GALERIA.nome + ' — CriaVibe';
  atualizarContador();

  // Botões (baseado nos módulos da galeria)
  if (GALERIA.selecao_ativa) {
    document.getElementById('btn-select-all').style.display = '';
    document.getElementById('btn-clear').style.display = '';
  }
  if (GALERIA.download_all || GALERIA.entrega_em_alta) {
    document.getElementById('btn-zip-sel').style.display = '';
    document.getElementById('btn-zip-all').style.display = '';
  }

  // Carrega fotos
  await carregarFotos();

  // Música
  carregarMusica();
}

async function carregarFotos() {
  const grid = document.getElementById('gallery');
  try {
    const r = await fetch(`/api/fotos/list.php?galeria_id=${GALERIA.id}`, {credentials:'include'});
    const d = await r.json();
    FOTOS = d.fotos || [];
    if (!FOTOS.length) {
      grid.innerHTML = '<div class="loading" style="color:rgba(255,255,255,.4)"><i class="fa-solid fa-images"></i><br>Nenhuma foto ainda.</div>';
      return;
    }
    grid.innerHTML = FOTOS.map((f,i) => {
      const src = '/' + f.caminho_arquivo;
      const nome = f.nome_arquivo || 'foto_' + f.id;
      return `
        <div class="foto-item" data-id="${f.id}" data-idx="${i}" onclick="clicarFoto(event,${i})">
          <img src="${src}" alt="${nome}" loading="lazy">
          <div class="sel-check"><i class="fa-solid fa-check"></i></div>
          ${(GALERIA.download_individual || GALERIA.entrega_em_alta) ? `
          <button class="dl-btn" onclick="event.stopPropagation();baixarFoto(${f.id})">
            <i class="fa-solid fa-download"></i> Baixar
          </button>` : ''}
        </div>`;
    }).join('');
  } catch (e) {
    grid.innerHTML = '<div class="loading" style="color:#f87171"><i class="fa-solid fa-triangle-exclamation"></i><br>Erro ao carregar fotos.</div>';
  }
}

async function carregarMusica() {
  if (!GALERIA.player_ativo) return;
  try {
    const r = await fetch(`/api/musicas/list.php?galeria_id=${GALERIA.id}`, {credentials:'include'});
    const d = await r.json();
    const musicas = d.musicas || [];
    if (!musicas.length) return;
    const bar = document.getElementById('music-bar');
    const audio = document.getElementById('audio-player');
    const title = document.getElementById('music-title');
    bar.style.display = 'flex';
    document.getElementById('gallery').style.paddingBottom = '80px';
    let idx = 0;
    function tocarMusica(i) {
      const m = musicas[i];
      title.textContent = m.titulo || m.nome_arquivo || 'Música';
      if (m.url_youtube) {
        audio.style.display = 'none';
      } else {
        audio.src = '/' + m.caminho_arquivo;
        audio.play().catch(()=>{});
      }
    }
    audio.addEventListener('ended', () => {
      idx = (idx + 1) % musicas.length;
      tocarMusica(idx);
    });
    tocarMusica(0);
  } catch {}
}

// ── SELECTION ─────────────────────────────────────────────────
let clickTimer = null;
let clickCount = 0;

function clicarFoto(e, idx) {
  if (e.target.classList.contains('dl-btn') || e.target.closest('.dl-btn')) return;
  
  clickCount++;
  
  if (clickCount === 1) {
    clickTimer = setTimeout(() => {
      // 1 Clique: Seleciona
      if (GALERIA.selecao_ativa) {
        toggleSelecao(idx);
      } else {
        abrirLightbox(idx);
      }
      clickCount = 0;
    }, 280);
  } else if (clickCount === 2) {
    clearTimeout(clickTimer);
    clickTimer = setTimeout(() => {
      // 2 Cliques: Amplia
      abrirLightbox(idx);
      clickCount = 0;
    }, 280);
  } else if (clickCount === 3) {
    clearTimeout(clickTimer);
    // 3 Cliques: Seleciona Todas
    if (GALERIA.selecao_ativa) {
      selecionarTodas();
    }
    clickCount = 0;
  }
}

function toggleSelecao(idx) {
  const id = FOTOS[idx].id;
  const el = document.querySelector(`.foto-item[data-idx="${idx}"]`);
  if (selecionadas.has(id)) { selecionadas.delete(id); el?.classList.remove('selected'); }
  else { selecionadas.add(id); el?.classList.add('selected'); }
  atualizarToolbar();
}

function selecionarTodas() {
  FOTOS.forEach((f,i) => {
    selecionadas.add(f.id);
    document.querySelector(`.foto-item[data-idx="${i}"]`)?.classList.add('selected');
  });
  atualizarToolbar();
}

function limparSelecao() {
  selecionadas.clear();
  document.querySelectorAll('.foto-item.selected').forEach(el => el.classList.remove('selected'));
  atualizarToolbar();
}

function atualizarToolbar() {
  const n = selecionadas.size;
  document.getElementById('sel-count').textContent = n;
  const btnZipSel = document.getElementById('btn-zip-sel');
  if (btnZipSel) btnZipSel.style.display = n > 0 ? '' : 'none';
  document.getElementById('toolbar-info').innerHTML =
    n > 0 ? `<b>${n} foto${n>1?'s':''} selecionada${n>1?'s':''}</b><br><span style="font-size:0.7rem;opacity:0.8">* 1 Clique: Seleciona | 2 Cliques: Amplia | 3 Cliques: Seleciona Todas</span>` :
    (GALERIA.selecao_ativa ? '* 1 Clique na foto para selecionar<br>* 2 Cliques para ampliar a foto na tela<br>* 3 Cliques para selecionar todas possíveis' : `${FOTOS.length} fotos`);
}

// ── DOWNLOADS ─────────────────────────────────────────────────
function atualizarContador() {
  if (dlMax > 0) {
    const el = document.getElementById('dl-counter');
    el.style.display = '';
    el.innerHTML = `<i class="fa-solid fa-download"></i> ${dlCount}/${dlMax} downloads`;
    el.style.color = dlCount >= dlMax ? '#f87171' : '';
  }
}

function checarLimite() {
  if (dlMax > 0 && dlCount >= dlMax) {
    toast(`Limite de ${dlMax} downloads atingido.`);
    return false;
  }
  return true;
}

async function baixarFoto(fotoId) {
  if (!checarLimite()) return;
  const url = `/api/fotos/download.php?foto_id=${fotoId}&galeria_id=${GALERIA.id}`;
  const a = document.createElement('a');
  a.href = url; a.download = ''; document.body.appendChild(a); a.click(); a.remove();
  dlCount++;
  atualizarContador();
  toast('Download iniciado!');
}

function baixarFotoAtual() { baixarFoto(FOTOS[lbIndex].id); }

async function baixarZipSelecionadas() {
  if (!selecionadas.size) { toast('Selecione pelo menos uma foto.'); return; }
  if (!checarLimite()) return;
  toast('Preparando ZIP...');
  const r = await fetch('/api/fotos/download_zip.php', {
    method:'POST', credentials:'include',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({galeria_id: GALERIA.id, foto_ids: [...selecionadas]})
  });
  if (r.ok) {
    const blob = await r.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = GALERIA.nome + '_selecionadas.zip';
    a.click(); URL.revokeObjectURL(url);
    dlCount++; atualizarContador();
    toast('ZIP baixado!');
  } else { toast('Erro ao gerar ZIP.'); }
}

async function baixarZipTodas() {
  if (!checarLimite()) return;
  toast('Preparando ZIP de todas as fotos...');
  const r = await fetch('/api/fotos/download_zip.php', {
    method:'POST', credentials:'include',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({galeria_id: GALERIA.id, foto_ids: []})
  });
  if (r.ok) {
    const blob = await r.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = GALERIA.nome + '_todas.zip';
    a.click(); URL.revokeObjectURL(url);
    dlCount++; atualizarContador();
    toast('ZIP baixado!');
  } else { toast('Erro ao gerar ZIP.'); }
}

// ── LIGHTBOX ─────────────────────────────────────────────────
function abrirLightbox(idx) {
  lbIndex = idx;
  document.getElementById('lb-img').src = '/' + FOTOS[idx].caminho_arquivo;
  document.getElementById('lightbox').classList.add('open');
}

function fecharLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

function navLightbox(dir) {
  lbIndex = (lbIndex + dir + FOTOS.length) % FOTOS.length;
  document.getElementById('lb-img').src = '/' + FOTOS[lbIndex].caminho_arquivo;
}

document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'ArrowLeft') navLightbox(-1);
  if (e.key === 'ArrowRight') navLightbox(1);
  if (e.key === 'Escape') fecharLightbox();
});

// ── TOAST ──────────────────────────────────────────────────────
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2800);
}

// ── INIT: check if gallery is public ──────────────────────────
(async () => {
  if (!TOKEN) {
    document.getElementById('lock-screen').innerHTML =
      '<div class="lock-card"><div class="lock-logo">✦ CriaVibe</div><p style="color:#f87171;margin-top:16px">Link inválido — token não encontrado.</p></div>';
    return;
  }
  // Pré-carrega nome da galeria para mostrar na tela de senha
  try {
    const r = await fetch(`/api/galerias/get.php?token=${TOKEN}`, {credentials:'include'});
    const d = await r.json();
    if (d.status === 'ok') {
      const g = d.galeria;
      document.getElementById('galeria-title-lock').textContent = g.nome;
      // Se galeria é pública e sem cliente vinculado, entra direto
      if (g.privacidade === 'publica' && !g.cliente_id) {
        GALERIA = g; dlMax = g.max_selecao ? parseInt(g.max_selecao) : 0;
        document.getElementById('lock-screen').style.display = 'none';
        iniciarGaleria();
      }
    }
  } catch {}
})();
</script>
