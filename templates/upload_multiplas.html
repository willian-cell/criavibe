<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Upload Múltiplo de Imagens</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial, sans-serif; background: #f5f6fa; }
        .container { max-width: 500px; margin: 40px auto; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px #0001; padding: 32px; }
        .img-preview { width: 80px; height: 80px; object-fit: cover; border-radius: 6px; margin-right: 8px; }
        .img-row { display: flex; align-items: center; margin-bottom: 12px; }
        @media (max-width: 600px) { .container { padding: 8px; } }
    </style>
</head>
<body>
    <div class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            <div>
              {% for category, message in messages %}
                <div class="alert-{{ category }}">
                  {{ message }}
                </div>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}
        <h2>Upload Múltiplo de Imagens</h2>
        <form id="multiUploadForm" method="post" enctype="multipart/form-data">
            <input type="file" name="imagens" id="imagens" multiple required accept="image/*"><br><br>
            <div id="previews"></div>
            <button type="submit">Enviar Imagens</button>
        </form>
        <a href="{{ url_for('ver_galeria', galeria_id=galeria_id) }}">&larr; Voltar para galeria</a>
    </div>
    <script>
        const input = document.getElementById('imagens');
        const previews = document.getElementById('previews');
        input.addEventListener('change', function() {
            previews.innerHTML = '';
            Array.from(input.files).forEach((file, idx) => {
                const row = document.createElement('div');
                row.className = 'img-row';
                const img = document.createElement('img');
                img.className = 'img-preview';
                img.src = URL.createObjectURL(file);
                row.appendChild(img);
                const titulo = document.createElement('input');
                titulo.type = 'text';
                titulo.name = 'titulos';
                titulo.placeholder = 'Título da imagem';
                titulo.required = true;
                row.appendChild(titulo);
                const desc = document.createElement('input');
                desc.type = 'text';
                desc.name = 'descricoes';
                desc.placeholder = 'Descrição';
                desc.required = true;
                row.appendChild(desc);
                previews.appendChild(row);
            });
        });
    </script>
</body>
</html>
