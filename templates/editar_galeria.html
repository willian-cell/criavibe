<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Editar Galeria</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial, sans-serif; background: #f5f6fa; }
        .container { max-width: 500px; margin: 40px auto; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px #0001; padding: 32px; }
        label { display: block; margin-top: 12px; }
        input, textarea, select { width: 100%; padding: 8px; margin-top: 4px; border-radius: 4px; border: 1px solid #ccc; }
        button { margin-top: 18px; background: #3b2dd6; color: #fff; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
        button:hover { background: #2a1fa0; }
        @media (max-width: 600px) { .container { padding: 8px; } }
    </style>
</head>
<body>
    <div class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            <div>
              {% for category, message in messages %}
                <div class="alert-{{ category }}">
                  {{ message }}
                </div>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}

        <h2>Editar Galeria</h2>
        <form method="post">
            <label for="nome">Nome</label>
            <input type="text" id="nome" name="nome" value="{{ galeria.nome }}" required>

            <label for="descricao">Descrição</label>
            <textarea id="descricao" name="descricao" required>{{ galeria.descricao }}</textarea>

            <label for="privacidade">Privacidade</label>
            <select id="privacidade" name="privacidade">
                <option value="publica" {% if galeria.privacidade == 'publica' %}selected{% endif %}>Pública</option>
                <option value="privada" {% if galeria.privacidade == 'privada' %}selected{% endif %}>Privada</option>
            </select>

            <label for="senha">Senha (se privada)</label>
            <input type="password" id="senha" name="senha" placeholder="Deixe em branco para manter a senha atual">

            <button type="submit">Salvar Alterações</button>
        </form>
        <a href="{{ url_for('ver_galeria', galeria_id=galeria.id) }}">&larr; Voltar para galeria</a>
    </div>
</body>
</html>
