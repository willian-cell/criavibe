<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Nova Galeria - CriaVibe</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        body { font-family: Arial, sans-serif; background: #f5f6fa; }
        .container { max-width: 500px; margin: 40px auto; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px #0001; padding: 32px; }
        label { display: block; margin-top: 12px; font-weight: bold; }
        input, textarea, select { width: 100%; padding: 8px; margin-top: 4px; border-radius: 4px; border: 1px solid #ccc; box-sizing: border-box; }
        button { margin-top: 18px; background: #3b2dd6; color: #fff; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; width: 100%; font-size: 1em; }
        button:hover { background: #2a1fa0; }
        .alert-success { background: #d1fae5; color: #065f46; padding:10px; margin-bottom:10px; border-radius:4px; }
        .alert-error { background: #fee2e2; color: #991b1b; padding:10px; margin-bottom:10px; border-radius:4px; }
        h2 { color: #3b2dd6; }
        @media (max-width: 600px) { .container { padding: 8px; } }
    </style>
</head>
<body>
    <div class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            <div>
              {% for category, message in messages %}
                <div class="alert-{{ category }}">{{ message }}</div>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}

        <h2>Nova Galeria</h2>
        <form method="POST" action="{{ url_for('nova_galeria') }}">
            <label for="nome">Nome da Galeria *</label>
            <input type="text" id="nome" name="nome" required placeholder="Ex: Casamento Silva">

            <label for="descricao">Descrição</label>
            <textarea id="descricao" name="descricao" rows="3" placeholder="Breve descrição da galeria"></textarea>

            <label for="privacidade">Privacidade</label>
            <select id="privacidade" name="privacidade">
                <option value="publica">Pública</option>
                <option value="privada">Privada</option>
            </select>

            <label for="senha">Senha (se privada)</label>
            <input type="password" id="senha" name="senha" placeholder="Deixe em branco se pública">

            <button type="submit">Criar Galeria</button>
        </form>
        <p style="margin-top:16px;"><a href="{{ url_for('painel_usuario') }}">← Voltar ao painel</a></p>
    </div>
</body>
</html>
