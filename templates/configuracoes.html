<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Configurações - CriaVibe</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        body { font-family: Arial, sans-serif; background: #f5f6fa; }
        .container { max-width: 500px; margin: 40px auto; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px #0001; padding: 32px; }
        h2 { color: #3b2dd6; }
        .info-box { background: #f0f0ff; border-radius: 6px; padding: 16px; margin-bottom: 16px; }
        .info-box p { margin: 6px 0; }
        a.btn { display: inline-block; margin-top: 16px; background: #3b2dd6; color: #fff; padding: 10px 20px; border-radius: 4px; text-decoration: none; }
        a.btn:hover { background: #2a1fa0; }
        @media (max-width: 600px) { .container { padding: 8px; } }
    </style>
</head>
<body>
    <div class="container">
        <h2>Configurações da Conta</h2>
        <div class="info-box">
            <p><strong>Nome:</strong> {{ usuario.nome }}</p>
            <p><strong>Email:</strong> {{ usuario.email }}</p>
            <p><strong>Tipo de conta:</strong> {{ usuario.tipo|capitalize }}</p>
        </div>
        <p style="color:#666;">Para alterar sua senha ou dados, entre em contato com o administrador do sistema.</p>
        <a class="btn" href="{{ url_for('painel_usuario') }}">← Voltar ao painel</a>
    </div>
</body>
</html>
