# Nginx example: rate limiting and proxy settings for uploads
limit_req_zone $binary_remote_addr zone=perip:10m rate=10r/s;
limit_req_zone $http_x_forwarded_for zone=peruser:10m rate=5r/s;

server {
    listen 80;
    server_name example.com;

    location /api/ {
        proxy_pass http://127.0.0.1:9000; # php-fpm or backend
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Apply rate limit per IP
        limit_req zone=perip burst=20 nodelay;
    }

    # Large uploads should be directed to direct_prepare/direct_confirm via browser to R2
}
